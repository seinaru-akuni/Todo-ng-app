<header class="bg-white dark:bg-gray-800 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
        
        <div class="flex-shrink-0 flex items-center">
            <a routerLink="/" class="text-2xl font-bold text-green-600 dark:text-green-400">
            ✓ ToDo App
            </a>
        </div>

        <nav class="flex items-center space-x-4">
    
        <a routerLink="/tasks" class="text-gray-700 dark:text-gray-300 hover:text-green-600 px-3 py-2 rounded-md font-medium">
            Мої завдання
        </a>
        
        @if (!isAuthenticated()) {
            <a routerLink="/login" class="text-gray-700 dark:text-gray-300 hover:text-green-600 px-3 py-2 rounded-md font-medium">
            Увійти
            </a>
            <a routerLink="/register" class="bg-green-600 text-white hover:bg-green-700 px-4 py-2 rounded-xl font-medium">
            Реєстрація
            </a>
        } 
        
        @else {
            <span class="text-sm text-gray-500 mr-2">
            Привіт, {{ currentUser()?.username }}
            </span>
            
            <button (click)="onLogout()" class="text-red-500 hover:text-red-700 px-3 py-2 rounded-md font-medium">
            Вийти
            </button>
        }

        </nav>

        </div>
    </div>
</header>
