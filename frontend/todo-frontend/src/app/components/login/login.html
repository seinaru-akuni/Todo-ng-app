<div class="text-black dark:text-white bg-white dark:bg-gray-800 p-6 rounded-4xl max-w-xl m-4 flex-col w-1/3 min-w-[300px]">
    <h3 class="text-lg text-center font-semibold mb-4">Вхід</h3>

    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-[10px]">
        <input class="my-1 p-2 border border-gray-300 rounded-2xl" type="email" placeholder="Електронна пошта" [(ngModel)]="email" name="email" required />
        <input class="my-1 p-2 border border-gray-300 rounded-2xl" [type]="showPassword ? 'text' : 'password'" placeholder="Пароль" [(ngModel)]="password" name="password" required />
        <button type="button" (click)="togglePassword()" class="flex items-center pr-3 text-gray-500 hover:text-gray-700">
            {{ showPassword ? 'Сховати' : 'Показати' }} пароль
        </button>
        <div class="flex justify-between items-center">
            <label class="flex items-center text-sm">
                <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="mr-1" />
                Запам'ятати мене
            </label>

            <a routerLink="/forgot-password" class="text-blue-500 hover:underline">
                Забули пароль?
            </a>
        </div>

        <button type="submit" class="my-5 bg-green-600 text-white py-2 px-4 rounded-2xl hover:bg-green-700">
            Увійти
        </button>
    </form>

    <a routerLink="/register" class="text-blue-500 hover:underline block mt-2">
        Немає акаунту? Зареєструйся тут
    </a>

    @if (error()) { <p class="text-red-500 mt-2">{{ error() }}</p> }
    @if (message()) { <p class="text-green-500 mt-2">{{ message() }}</p> }

    <!-- <button (click)="onCheckMe()" class="mt-4 w-full bg-gray-200 dark:bg-gray-700 py-2 rounded-xl">
        Перевірити сесію (/me)
    </button> -->
</div>
